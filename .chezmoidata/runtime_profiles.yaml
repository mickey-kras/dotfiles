# Transitional: kept only for runtime parity tests.
# Source of truth is packs/*/pack.yaml profiles and guardrails.
catalog_version: 1

profiles:
  full:
    description: Software-development default with the full managed toolchain enabled.
    permission_groups:
      - core_read_write
      - shell_readonly
      - git_full
      - gh_full
      - dev_runtime
      - local_file_mutation
      - containers
      - infra_local
      - package_runtime
      - cloud_extended
      - secret_tools
      - web_access

mcp_sets:
  full:
    - playwright
    - context7
    - figma
    - stitch
    - filesystem
    - git
    - memory
    - obsidian
    - thinking
    - github
    - shell
    - docker
    - process
    - terraform
    - kubernetes
    - http
    - firebase
    - aws
    - tailscale
    - magic
    - replicate

mcp_catalog:
  playwright:
    transport: stdio
    needs_secrets: false
    reads_remote: true
    writes_remote: false
    reads_local: false
    executes_local_processes: true
    mutates_local_system: false
    prompt_injection_risk: medium
    notes: Browser automation against potentially hostile pages.
