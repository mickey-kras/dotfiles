name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  templates-and-resolvers:
    name: Templates and Resolvers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

      - name: Run Python tests
        env:
          PYTHONPATH: tests:scripts
        run: python3 -m unittest tests.test_render_snapshots scripts.test_pack_state scripts.test_install_script_templates tests.test_runtime_parity

      - name: Validate shell syntax
        run: |
          bash -n scripts/bootstrap.sh
          bash -n dot_local/bin/executable_dotfiles-update

  wizard-tests:
    name: Wizard Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run wizard tests
        run: dotnet test scripts/wizard-tests/DotfilesWizard.Tests.csproj --nologo --verbosity minimal
