version: 1

id: software-development
label: Software Development
description: Software delivery pack across planning, implementation, testing, review, docs, and incident response.

defaults:
  profile: backend
  selection:
    settings:
      memory_provider: obsidian
      obsidian_vault_path: ""
      install_claude_code: enabled
      install_codex: enabled
      install_cursor: enabled
      install_gemini_cli: enabled
      install_droid: enabled
      install_kimi_code: enabled
      stitch_api_key: ""
      bw_gate_install: enabled
      dotfiles_authorship_rule: disabled
      dotfiles_pr_workflow_rule: disabled

ui:
  sections:
    - id: mcps
      label: MCP Servers
    - id: skills
      label: Skills
    - id: agents
      label: Agents
    - id: rules
      label: Rules
    - id: permissions
      label: Permission Groups
    - id: settings
      label: Settings

settings_schema:
  memory_provider:
    type: enum
    label: Memory Provider
    default: obsidian
    options:
      - value: builtin
        label: Builtin Memory
      - value: obsidian
        label: Obsidian
  obsidian_vault_path:
    type: string
    label: Obsidian Vault Path
    default: ""
    visible_if:
      memory_provider: obsidian
  install_claude_code:
    type: enum
    label: Install Claude Code CLI
    default: enabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_codex:
    type: enum
    label: Install Codex CLI
    default: enabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_cursor:
    type: enum
    label: Install Cursor CLI
    default: enabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_gemini_cli:
    type: enum
    label: Install Gemini CLI
    default: enabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_droid:
    type: enum
    label: Install Droid CLI
    default: enabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_kimi_code:
    type: enum
    label: Install Kimi Code CLI
    default: enabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  stitch_api_key:
    type: string
    label: Stitch API Key
    default: ""
  bw_gate_install:
    type: enum
    label: Install bw-gate (macOS)
    default: enabled
    options:
      - value: enabled
        label: Enabled
      - value: disabled
        label: Disabled
  dotfiles_authorship_rule:
    type: enum
    label: Add 'no AI authorship' rule to CLAUDE.md
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  dotfiles_pr_workflow_rule:
    type: enum
    label: Add 'feature branches + squash-merge PRs' rule to CLAUDE.md
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled

catalogs:
  mcps:
    playwright:
      label: Playwright
      description: Browser automation and E2E testing
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
    context7:
      label: Context7
      description: Current library docs and examples
      transport: http
      needs_secrets: false
      prompt_injection_risk: low
    figma:
      label: Figma
      description: Design-to-code and design system access
      transport: http
      needs_secrets: false
      prompt_injection_risk: medium
    stitch:
      label: Stitch
      description: Google Stitch design generation MCP
      transport: http
      needs_secrets: true
      prompt_injection_risk: medium
      requires:
        settings:
          - stitch_api_key
    filesystem:
      label: Filesystem
      description: Local file browsing rooted narrowly
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    git:
      label: Git
      description: Repository inspection and history
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    memory:
      label: Memory
      description: Local MCP memory store or Obsidian-backed memory
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    thinking:
      label: Sequential Thinking
      description: Structured local reasoning MCP
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    github:
      label: GitHub
      description: GitHub MCP via Bitwarden-backed PAT
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    shell:
      label: Shell
      description: Controlled shell execution surface
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
    docker:
      label: Docker
      description: Container and daemon interaction surface
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
      required_tools:
        - docker
    process:
      label: Process
      description: Local process inspection
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    terraform:
      label: Terraform
      description: Terraform inspection and IaC workflows
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    kubernetes:
      label: Kubernetes
      description: Cluster and manifest inspection
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
    http:
      label: HTTP Fetch
      description: Open remote content fetch surface
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: high
      required_tools:
        - uvx
    firebase:
      label: Firebase
      description: Firebase MCP via Firebase CLI
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
      required_tools:
        - firebase
    aws:
      label: AWS
      description: AWS API access via Bitwarden-backed credentials
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - uvx
        - bw
    tailscale:
      label: Tailscale
      description: Tailscale admin API access
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    magic:
      label: Magic
      description: 21st.dev Magic MCP
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    replicate:
      label: Replicate
      description: Replicate image and model tooling MCP
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    obsidian:
      label: Obsidian REST
      description: Obsidian Local REST API MCP
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
      requires:
        settings:
          - obsidian_vault_path

  skills:
    context7-mcp:
      label: Context7 MCP
    context-budget:
      label: Context Budget
    dispatching-parallel-agents:
      label: Dispatching Parallel Agents
    executing-plans:
      label: Executing Plans
    obsidian-memory:
      label: Obsidian Memory
    receiving-code-review:
      label: Receiving Code Review
    requesting-code-review:
      label: Requesting Code Review
    systematic-debugging:
      label: Systematic Debugging
    test-driven-development:
      label: Test Driven Development
    using-git-worktrees:
      label: Using Git Worktrees
    verification-before-completion:
      label: Verification Before Completion
    writing-plans:
      label: Writing Plans

  agents:
    delivery-orchestrator:
      label: Delivery Orchestrator
    planner:
      label: Planner
    product-manager:
      label: Product Manager
    workflow-architect:
      label: Workflow Architect
    backend-engineer:
      label: Backend Engineer
    frontend-engineer:
      label: Frontend Engineer
    staff-engineer:
      label: Staff Engineer
    quality-engineer:
      label: Quality Engineer
    code-reviewer:
      label: Code Reviewer
    debugger:
      label: Debugger
    git-workflow-master:
      label: Git Workflow Master
    devops-engineer:
      label: DevOps Engineer
    security-engineer:
      label: Security Engineer
    technical-writer:
      label: Technical Writer
    incident-commander:
      label: Incident Commander

  rules:
    bitwarden-setup:
      label: Bitwarden Setup
    code-style:
      label: Code Style
    development-workflow:
      label: Development Workflow
    git-workflow:
      label: Git Workflow
    performance:
      label: Performance
    security:
      label: Security
    testing:
      label: Testing

  permissions:
    core_read_write:
      label: Core Read Write
      allow:
        - Read
        - Edit
        - Write
    shell_readonly:
      label: Shell Readonly
      allow:
        - Bash(ls *)
        - Bash(cat *)
        - Bash(head *)
        - Bash(tail *)
        - Bash(wc *)
        - Bash(find *)
        - Bash(grep *)
        - Bash(rg *)
        - Bash(jq *)
    # ---- git ----
    git_safe:
      label: Git Safe (read-only)
      allow:
        - Bash(git status*)
        - Bash(git diff*)
        - Bash(git log*)
        - Bash(git show*)
        - Bash(git blame*)
        - Bash(git reflog*)
        - Bash(git ls-files*)
        - Bash(git ls-tree*)
        - Bash(git rev-parse*)
        - Bash(git rev-list*)
        - Bash(git config --get*)
        - Bash(git config --list*)
        - Bash(git remote -v*)
        - Bash(git remote get-url*)
        - Bash(git tag --list*)
        - Bash(git tag -l*)
        - Bash(git branch --list*)
        - Bash(git branch -v*)
        - Bash(git describe*)
        - Bash(git worktree list*)
    git_writes:
      label: Git Writes (no history rewrite; destructive ops still denied by guardrails)
      allow:
        - Bash(git add*)
        - Bash(git commit*)
        - Bash(git fetch*)
        - Bash(git pull*)
        - Bash(git push*)
        - Bash(git checkout*)
        - Bash(git switch*)
        - Bash(git merge*)
        - Bash(git rebase*)
        - Bash(git stash*)
        - Bash(git tag*)
        - Bash(git branch*)
        - Bash(git remote*)
        - Bash(git config*)
        - Bash(git reset*)
        - Bash(git revert*)
        - Bash(git cherry-pick*)
        - Bash(git submodule*)
        - Bash(git worktree*)
        - Bash(git restore*)
        - Bash(git init*)
        - Bash(git clone*)
    git_full:
      label: Git Full (opt-in; everything subject to guardrails)
      allow:
        - Bash(git *)

    # ---- gh ----
    gh_safe:
      label: GitHub Safe (read-only)
      allow:
        - Bash(gh pr view*)
        - Bash(gh pr list*)
        - Bash(gh pr checks*)
        - Bash(gh pr diff*)
        - Bash(gh pr status*)
        - Bash(gh issue view*)
        - Bash(gh issue list*)
        - Bash(gh repo view*)
        - Bash(gh repo list*)
        - Bash(gh release view*)
        - Bash(gh release list*)
        - Bash(gh run view*)
        - Bash(gh run list*)
        - Bash(gh workflow view*)
        - Bash(gh workflow list*)
        - Bash(gh auth status*)
        - Bash(gh search*)
        - Bash(gh api*)
    gh_writes:
      label: GitHub Writes (PRs/issues/releases; destructive ops denied by guardrails)
      allow:
        - Bash(gh pr*)
        - Bash(gh issue*)
        - Bash(gh release*)
        - Bash(gh repo clone*)
        - Bash(gh repo create*)
        - Bash(gh repo edit*)
        - Bash(gh repo fork*)
        - Bash(gh repo rename*)
        - Bash(gh repo sync*)
        - Bash(gh auth*)
        - Bash(gh ssh-key add*)
        - Bash(gh ssh-key list*)
        - Bash(gh workflow*)
        - Bash(gh run*)
        - Bash(gh label*)
        - Bash(gh secret set*)
        - Bash(gh secret list*)
        - Bash(gh variable set*)
        - Bash(gh variable list*)
    gh_full:
      label: GitHub Full (opt-in; everything subject to guardrails)
      allow:
        - Bash(gh *)

    # ---- dev runtimes / file ops (kept) ----
    dev_runtime:
      label: Dev Runtime
      allow:
        - Bash(node *)
        - Bash(dotnet *)
        - Bash(python3 *)
        - Bash(pytest *)
        - Bash(make *)
        - Bash(k6 *)
    local_file_mutation:
      label: Local File Mutation
      allow:
        - Bash(mkdir *)
        - Bash(cp *)
        - Bash(mv *)
        - Bash(touch *)
        - Bash(chmod +x *)
        - Bash(ln *)
        - Bash(ln -s*)
    package_runtime:
      label: Package Runtime
      allow:
        - Bash(npm *)
        - Bash(npx *)
        - Bash(pip *)

    # ---- containers ----
    containers_readonly:
      label: Containers Read-Only
      allow:
        - Bash(docker ps*)
        - Bash(docker images*)
        - Bash(docker inspect*)
        - Bash(docker logs*)
        - Bash(docker stats*)
        - Bash(docker version*)
        - Bash(docker info*)
        - Bash(docker compose ps*)
        - Bash(docker compose logs*)
        - Bash(docker compose config*)
    containers_writes:
      label: Containers Writes (destructive ops denied by guardrails)
      allow:
        - Bash(docker build*)
        - Bash(docker run*)
        - Bash(docker exec*)
        - Bash(docker stop*)
        - Bash(docker start*)
        - Bash(docker restart*)
        - Bash(docker rm *)
        - Bash(docker pull*)
        - Bash(docker push*)
        - Bash(docker tag*)
        - Bash(docker compose up*)
        - Bash(docker compose down*)
        - Bash(docker compose build*)
        - Bash(docker compose exec*)
    containers:
      label: Containers Full (opt-in; everything subject to guardrails)
      allow:
        - Bash(docker *)

    # ---- infra (terraform/kubectl/az) ----
    infra_readonly:
      label: Infra Read-Only
      allow:
        - Bash(kubectl get*)
        - Bash(kubectl describe*)
        - Bash(kubectl logs*)
        - Bash(kubectl explain*)
        - Bash(kubectl config view*)
        - Bash(kubectl config get-contexts*)
        - Bash(kubectl version*)
        - Bash(kubectl api-resources*)
        - Bash(kubectl api-versions*)
        - Bash(kubectl top*)
        - Bash(terraform init*)
        - Bash(terraform validate*)
        - Bash(terraform plan*)
        - Bash(terraform show*)
        - Bash(terraform fmt*)
        - Bash(terraform state list*)
        - Bash(terraform state show*)
        - Bash(terraform output*)
        - Bash(terraform workspace list*)
        - Bash(terraform workspace show*)
        - Bash(terraform version*)
        - Bash(terraform providers*)
        - Bash(az account show*)
        - Bash(az account list*)
        - Bash(az group show*)
        - Bash(az group list*)
        - Bash(az resource show*)
        - Bash(az resource list*)
        - Bash(az * show*)
        - Bash(az * list*)
    infra_writes:
      label: Infra Writes (apply/run; destructive ops denied by guardrails)
      allow:
        - Bash(kubectl apply*)
        - Bash(kubectl create*)
        - Bash(kubectl edit*)
        - Bash(kubectl patch*)
        - Bash(kubectl scale*)
        - Bash(kubectl rollout*)
        - Bash(kubectl label*)
        - Bash(kubectl annotate*)
        - Bash(kubectl exec*)
        - Bash(kubectl port-forward*)
        - Bash(kubectl config use-context*)
        - Bash(kubectl config set-context*)
        - Bash(terraform apply*)
        - Bash(terraform import*)
        - Bash(terraform refresh*)
        - Bash(terraform taint*)
        - Bash(terraform untaint*)
        - Bash(terraform workspace new*)
        - Bash(terraform workspace select*)
        - Bash(az login*)
        - Bash(az logout*)
        - Bash(az account set*)
    infra_local:
      label: Infra Full (opt-in; everything subject to guardrails)
      allow:
        - Bash(az *)
        - Bash(terraform *)
        - Bash(kubectl *)

    # ---- cloud (aws / gcloud / firebase / wrangler) ----
    cloud_readonly:
      label: Cloud Read-Only
      allow:
        - Bash(aws s3 ls*)
        - Bash(aws s3api list*)
        - Bash(aws s3api get*)
        - Bash(aws s3api head*)
        - Bash(aws sts get-caller-identity*)
        - Bash(aws * describe-*)
        - Bash(aws * list-*)
        - Bash(aws * get-*)
        - Bash(gcloud auth list*)
        - Bash(gcloud config list*)
        - Bash(gcloud projects list*)
        - Bash(gcloud projects describe*)
        - Bash(gcloud * list*)
        - Bash(gcloud * describe*)
        - Bash(firebase projects:list*)
        - Bash(firebase use*)
        - Bash(wrangler whoami*)
        - Bash(wrangler tail*)
    cloud_writes:
      label: Cloud Writes (deploys; destructive ops denied by guardrails)
      allow:
        - Bash(aws s3 cp*)
        - Bash(aws s3 sync*)
        - Bash(aws s3 mb*)
        - Bash(aws s3api put-*)
        - Bash(aws s3api copy-*)
        - Bash(aws cloudformation deploy*)
        - Bash(aws cloudformation create-*)
        - Bash(aws cloudformation update-*)
        - Bash(aws lambda update-*)
        - Bash(aws lambda invoke*)
        - Bash(gcloud auth*)
        - Bash(gcloud config set*)
        - Bash(gcloud * create*)
        - Bash(gcloud * update*)
        - Bash(gcloud * deploy*)
        - Bash(firebase deploy*)
        - Bash(firebase emulators:*)
        - Bash(wrangler deploy*)
        - Bash(wrangler dev*)
        - Bash(wrangler publish*)
    cloud_extended:
      label: Cloud Full (opt-in; everything subject to guardrails)
      allow:
        - Bash(aws *)
        - Bash(firebase *)
        - Bash(gcloud *)
        - Bash(wrangler *)

    # ---- secrets / web ----
    secret_tools:
      label: Secret Tools
      allow:
        - Bash(bw *)
        - Bash(uvx *)
    web_access:
      label: Web Access
      allow:
        - Bash(curl *)
        - WebFetch
        - WebSearch

guardrails:
  hard_bans:
    shared:
      # System privilege escalation
      - Bash(sudo *)
      - Bash(su *)

      # Filesystem destruction
      - Bash(rm -rf /)
      - Bash(rm -rf /*)
      - Bash(rm -rf ~)
      - Bash(rm -rf ~/*)
      - Bash(rm -rf $HOME*)
      - Bash(rm -rf .)
      - Bash(rm -rf ./*)
      - Bash(rm -rf ..)
      - Bash(dd if=/dev/zero*)
      - Bash(dd if=/dev/random*)
      - Bash(> /dev/sda*)
      - Bash(mkfs.*)
      - Bash(chmod 777 *)
      - Bash(chmod -R 777 *)

      # Git history rewriting / destructive
      - Bash(git push --force*)
      - Bash(git push -f*)
      - Bash(git push --force-with-lease*)
      - Bash(git push --mirror*)
      - Bash(git reset --hard*)
      - Bash(git clean -f*)
      - Bash(git clean -d*)
      - Bash(git clean -x*)
      - Bash(git branch -D *)
      - Bash(git branch --delete --force*)
      - Bash(git checkout --orphan*)
      - Bash(git filter-branch*)
      - Bash(git filter-repo*)
      - Bash(git update-ref -d *)

      # GitHub destructive
      - Bash(gh repo delete*)
      - Bash(gh release delete*)
      - Bash(gh pr close*)
      - Bash(gh issue close*)
      - Bash(gh ssh-key delete*)
      - Bash(gh secret remove*)
      - Bash(gh variable delete*)

      # Kubernetes destructive
      - Bash(kubectl delete *)
      - Bash(kubectl drain *)
      - Bash(kubectl cordon *)

      # Terraform destructive
      - Bash(terraform destroy*)
      - Bash(terraform state rm *)
      - Bash(terraform state mv *)
      - Bash(terraform workspace delete *)

      # Cloud destructive (recursive / mass)
      - Bash(aws s3 rm * --recursive*)
      - Bash(aws s3 rb * --force*)
      - Bash(aws s3api delete-objects*)
      - Bash(aws ec2 terminate-instances*)
      - Bash(aws rds delete-*)
      - Bash(aws iam delete-*)
      - Bash(gcloud * delete *)
      - Bash(az * delete *)

      # Containers destructive
      - Bash(docker system prune*)
      - Bash(docker volume rm *)
      - Bash(docker volume prune*)
      - Bash(docker network prune*)

      # Package publishing (accidental release)
      - Bash(npm publish*)
      - Bash(pnpm publish*)
      - Bash(yarn publish*)
      - Bash(pip publish*)
      - Bash(twine upload*)
      - Bash(cargo publish*)

      # Bypass checks
      - Bash(* --no-verify*)
      - Bash(git * --no-verify*)
      - Bash(git commit * --no-gpg-sign*)

profiles:
  # Three profiles:
  #   - backend  (default): pure backend / infra work; no design skills/MCPs
  #   - frontend          : design-focused: adds uiux-*, figma-*, shadcn-ui,
  #                         brutalist, minimalist, stitch-* skills and the
  #                         figma/stitch/magic MCPs
  #   - fullstack         : everything from backend + frontend
  # Switch profiles via 'runtime_profile' in chezmoi data, or per-item overrides
  # via custom_enabled_mcps / custom_disabled_mcps.

  backend:
    label: Senior Backend / Full-Stack Engineer
    description: General software engineering. Excludes design-oriented skills (uiux-*, figma-*, shadcn-ui, brutalist, minimalist, stitch-*) and design MCPs (figma, stitch, magic).
    selection:
      mcps:
        enabled:
          - aws
          - context7
          - docker
          - filesystem
          - firebase
          - git
          - github
          - http
          - kubernetes
          - memory
          - obsidian
          - playwright
          - process
          - replicate
          - shell
          - tailscale
          - terraform
          - thinking
      skills:
        enabled:
          - context-budget
          - context7-mcp
          - dispatching-parallel-agents
          - executing-plans
          - obsidian-memory
          - receiving-code-review
          - requesting-code-review
          - systematic-debugging
          - test-driven-development
          - using-git-worktrees
          - verification-before-completion
          - writing-plans
      agents:
        enabled:
          - delivery-orchestrator
          - planner
          - product-manager
          - workflow-architect
          - backend-engineer
          - staff-engineer
          - quality-engineer
          - code-reviewer
          - debugger
          - git-workflow-master
          - devops-engineer
          - security-engineer
          - technical-writer
          - incident-commander
      rules:
        enabled:
          - bitwarden-setup
          - code-style
          - development-workflow
          - git-workflow
          - performance
          - security
          - testing
      permissions:
        enabled:
          - core_read_write
          - shell_readonly
          - git_safe
          - git_writes
          - gh_safe
          - gh_writes
          - dev_runtime
          - local_file_mutation
          - containers_readonly
          - containers_writes
          - infra_readonly
          - infra_writes
          - package_runtime
          - cloud_readonly
          - cloud_writes
          - secret_tools
          - web_access
      settings:
        memory_provider: obsidian
        obsidian_vault_path: ""
        install_claude_code: enabled
        install_codex: enabled
        install_cursor: enabled
        install_gemini_cli: enabled
        install_droid: enabled
        install_kimi_code: enabled
        stitch_api_key: ""

  frontend:
    label: Senior Frontend / Design Engineer
    description: Design-focused engineering. Includes uiux-*, figma-*, shadcn-ui, brutalist, minimalist, stitch-* skills and figma/stitch/magic MCPs. Drops infra/cloud tooling that fullstack/backend roles need.
    selection:
      mcps:
        enabled:
          - context7
          - docker
          - figma
          - filesystem
          - firebase
          - git
          - github
          - http
          - magic
          - memory
          - obsidian
          - playwright
          - process
          - replicate
          - shell
          - stitch
          - thinking
      skills:
        enabled:
          - context-budget
          - context7-mcp
          - dispatching-parallel-agents
          - executing-plans
          - obsidian-memory
          - receiving-code-review
          - requesting-code-review
          - systematic-debugging
          - test-driven-development
          - using-git-worktrees
          - verification-before-completion
          - writing-plans
          # frontend-specific (design)
          - design-md
          - design-taste-frontend
          - emil-design-eng
          - enhance-prompt
          - figma-create-design-system-rules
          - figma-generate-design
          - figma-implement-design
          - figma-use
          - full-output-enforcement
          - high-end-visual-design
          - impeccable
          - industrial-brutalist-ui
          - minimalist-ui
          - react-components
          - redesign
          - remotion
          - shadcn-ui
          - stitch-design
          - stitch-loop
          - taste-design
          - uiux-banner-design
          - uiux-brand
          - uiux-design
          - uiux-design-system
          - uiux-pro-max
          - uiux-slides
          - uiux-ui-styling
      agents:
        enabled:
          - delivery-orchestrator
          - planner
          - product-manager
