version: 1

id: software-development
label: Software Development
description: Software delivery pack across planning, implementation, testing, review, docs, and incident response.

defaults:
  profile: full
  selection:
    settings:
      memory_provider: obsidian
      obsidian_vault_path: ""
      install_claude_code: disabled
      install_codex: disabled
      install_cursor: disabled
      install_gemini_cli: disabled
      install_droid: disabled
      stitch_api_key: ""
      bw_gate_install: enabled

ui:
  sections:
    - id: mcps
      label: MCP Servers
    - id: skills
      label: Skills
    - id: agents
      label: Agents
    - id: rules
      label: Rules
    - id: permissions
      label: Permission Groups
    - id: settings
      label: Settings

settings_schema:
  memory_provider:
    type: enum
    label: Memory Provider
    default: obsidian
    options:
      - value: builtin
        label: Builtin Memory
      - value: obsidian
        label: Obsidian
  obsidian_vault_path:
    type: string
    label: Obsidian Vault Path
    default: ""
    visible_if:
      memory_provider: obsidian
  install_claude_code:
    type: enum
    label: Install Claude Code CLI
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_codex:
    type: enum
    label: Install Codex CLI
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_cursor:
    type: enum
    label: Install Cursor CLI
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_gemini_cli:
    type: enum
    label: Install Gemini CLI
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  install_droid:
    type: enum
    label: Install Droid CLI
    default: disabled
    options:
      - value: disabled
        label: Disabled
      - value: enabled
        label: Enabled
  stitch_api_key:
    type: string
    label: Stitch API Key
    default: ""
  bw_gate_install:
    type: enum
    label: Install bw-gate (macOS)
    default: enabled
    options:
      - value: enabled
        label: Enabled
      - value: disabled
        label: Disabled

catalogs:
  mcps:
    playwright:
      label: Playwright
      description: Browser automation and E2E testing
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
    context7:
      label: Context7
      description: Current library docs and examples
      transport: http
      needs_secrets: false
      prompt_injection_risk: low
    figma:
      label: Figma
      description: Design-to-code and design system access
      transport: http
      needs_secrets: false
      prompt_injection_risk: medium
    stitch:
      label: Stitch
      description: Google Stitch design generation MCP
      transport: http
      needs_secrets: true
      prompt_injection_risk: medium
      requires:
        settings:
          - stitch_api_key
    filesystem:
      label: Filesystem
      description: Local file browsing rooted narrowly
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    git:
      label: Git
      description: Repository inspection and history
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    memory:
      label: Memory
      description: Local MCP memory store or Obsidian-backed memory
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    thinking:
      label: Sequential Thinking
      description: Structured local reasoning MCP
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    github:
      label: GitHub
      description: GitHub MCP via Bitwarden-backed PAT
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    shell:
      label: Shell
      description: Controlled shell execution surface
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
    docker:
      label: Docker
      description: Container and daemon interaction surface
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
      required_tools:
        - docker
    process:
      label: Process
      description: Local process inspection
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    terraform:
      label: Terraform
      description: Terraform inspection and IaC workflows
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: low
    kubernetes:
      label: Kubernetes
      description: Cluster and manifest inspection
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
    http:
      label: HTTP Fetch
      description: Open remote content fetch surface
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: high
      required_tools:
        - uvx
    firebase:
      label: Firebase
      description: Firebase MCP via Firebase CLI
      transport: stdio
      needs_secrets: false
      prompt_injection_risk: medium
      required_tools:
        - firebase
    aws:
      label: AWS
      description: AWS API access via Bitwarden-backed credentials
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - uvx
        - bw
    tailscale:
      label: Tailscale
      description: Tailscale admin API access
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    magic:
      label: Magic
      description: 21st.dev Magic MCP
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    replicate:
      label: Replicate
      description: Replicate image and model tooling MCP
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
    obsidian:
      label: Obsidian REST
      description: Obsidian Local REST API MCP
      transport: stdio
      needs_secrets: true
      prompt_injection_risk: medium
      required_tools:
        - bw
      requires:
        settings:
          - obsidian_vault_path

  skills:
    context7-mcp:
      label: Context7 MCP
    context-budget:
      label: Context Budget
    dispatching-parallel-agents:
      label: Dispatching Parallel Agents
    executing-plans:
      label: Executing Plans
    obsidian-memory:
      label: Obsidian Memory
    receiving-code-review:
      label: Receiving Code Review
    requesting-code-review:
      label: Requesting Code Review
    systematic-debugging:
      label: Systematic Debugging
    test-driven-development:
      label: Test Driven Development
    using-git-worktrees:
      label: Using Git Worktrees
    verification-before-completion:
      label: Verification Before Completion
    writing-plans:
      label: Writing Plans

  agents:
    delivery-orchestrator:
      label: Delivery Orchestrator
    planner:
      label: Planner
    product-manager:
      label: Product Manager
    workflow-architect:
      label: Workflow Architect
    backend-engineer:
      label: Backend Engineer
    frontend-engineer:
      label: Frontend Engineer
    staff-engineer:
      label: Staff Engineer
    quality-engineer:
      label: Quality Engineer
    code-reviewer:
      label: Code Reviewer
    debugger:
      label: Debugger
    git-workflow-master:
      label: Git Workflow Master
    devops-engineer:
      label: DevOps Engineer
    security-engineer:
      label: Security Engineer
    technical-writer:
      label: Technical Writer
    incident-commander:
      label: Incident Commander

  rules:
    bitwarden-setup:
      label: Bitwarden Setup
    code-style:
      label: Code Style
    development-workflow:
      label: Development Workflow
    git-workflow:
      label: Git Workflow
    performance:
      label: Performance
    security:
      label: Security
    testing:
      label: Testing

  permissions:
    core_read_write:
      label: Core Read Write
      allow:
        - Read
        - Edit
        - Write
    shell_readonly:
      label: Shell Readonly
      allow:
        - Bash(ls *)
        - Bash(cat *)
        - Bash(head *)
        - Bash(tail *)
        - Bash(wc *)
        - Bash(find *)
        - Bash(grep *)
        - Bash(rg *)
        - Bash(jq *)
    git_safe:
      label: Git Safe
      allow:
        - Bash(git status*)
        - Bash(git diff*)
        - Bash(git log*)
    gh_safe:
      label: GitHub Safe
      allow:
        - Bash(gh pr view*)
        - Bash(gh pr checks*)
    git_full:
      label: Git Full
      allow:
        - Bash(git *)
    gh_full:
      label: GitHub Full
      allow:
        - Bash(gh *)
    dev_runtime:
      label: Dev Runtime
      allow:
        - Bash(node *)
        - Bash(dotnet *)
        - Bash(python3 *)
        - Bash(pytest *)
        - Bash(make *)
        - Bash(k6 *)
    local_file_mutation:
      label: Local File Mutation
      allow:
        - Bash(mkdir *)
        - Bash(cp *)
        - Bash(mv *)
        - Bash(touch *)
        - Bash(chmod +x *)
    containers:
      label: Containers
      allow:
        - Bash(docker *)
    infra_local:
      label: Infra Local
      allow:
        - Bash(az *)
        - Bash(terraform *)
        - Bash(kubectl *)
    package_runtime:
      label: Package Runtime
      allow:
        - Bash(npm *)
        - Bash(npx *)
        - Bash(pip *)
    cloud_extended:
      label: Cloud Extended
      allow:
        - Bash(aws *)
        - Bash(firebase *)
        - Bash(gcloud *)
        - Bash(wrangler *)
    secret_tools:
      label: Secret Tools
      allow:
        - Bash(bw *)
        - Bash(uvx *)
    web_access:
      label: Web Access
      allow:
        - Bash(curl *)
        - WebFetch
        - WebSearch

guardrails:
  hard_bans:
    shared:
      - Bash(sudo *)
      - Bash(su *)
      - Bash(rm -rf /)
      - Bash(dd if=/dev/zero*)
      - Bash(chmod 777 *)
      - Bash(> /dev/sda*)
    restricted:
      - Bash(uv *)
      - Bash(uvx *)
      - Bash(npm install*)
      - Bash(npm i*)
      - Bash(npx *)
      - Bash(pip install*)
      - Bash(choco install*)
      - Bash(winget install*)

profiles:
  full:
    label: Full
    description: Software development setup with the current shared AI toolchain enabled by default.
    selection:
      mcps:
        enabled:
          - playwright
          - context7
          - figma
          - stitch
          - filesystem
          - git
          - memory
          - obsidian
          - thinking
          - github
          - shell
          - docker
          - process
          - terraform
          - kubernetes
          - http
          - firebase
          - aws
          - tailscale
          - magic
          - replicate
      skills:
        enabled:
          - context7-mcp
          - context-budget
          - dispatching-parallel-agents
          - executing-plans
          - obsidian-memory
          - receiving-code-review
          - requesting-code-review
          - systematic-debugging
          - test-driven-development
          - using-git-worktrees
          - verification-before-completion
          - writing-plans
          - uiux-pro-max
          - uiux-ui-styling
          - uiux-design
          - uiux-brand
          - uiux-banner-design
          - uiux-slides
          - uiux-design-system
          - shadcn-ui
          - stitch-design
          - stitch-loop
          - react-components
          - redesign
          - remotion
          - emil-design-eng
          - design-md
          - enhance-prompt
          - figma-use
          - figma-generate-design
          - figma-implement-design
          - figma-create-design-system-rules
          - industrial-brutalist-ui
          - minimalist-ui
          - impeccable
          - frontend-design
          - high-end-visual-design
          - taste-design
          - design-taste-frontend
          - full-output-enforcement
      agents:
        enabled:
          - delivery-orchestrator
          - planner
          - product-manager
          - workflow-architect
          - backend-engineer
          - frontend-engineer
          - staff-engineer
          - quality-engineer
          - code-reviewer
          - debugger
          - git-workflow-master
          - devops-engineer
          - security-engineer
          - technical-writer
          - incident-commander
      rules:
        enabled:
          - bitwarden-setup
          - code-style
          - development-workflow
          - git-workflow
          - performance
          - security
          - testing
      permissions:
        enabled:
          - core_read_write
          - shell_readonly
          - git_full
          - gh_full
          - dev_runtime
          - local_file_mutation
          - containers
          - infra_local
          - package_runtime
          - cloud_extended
          - secret_tools
          - web_access
      settings:
        memory_provider: obsidian
        obsidian_vault_path: ""
        install_claude_code: enabled
        install_codex: enabled
        install_cursor: enabled
        install_gemini_cli: enabled
        install_droid: enabled
        stitch_api_key: ""

tooling:
  claude_agents:
    - delivery-orchestrator
    - planner
    - product-manager
    - workflow-architect
    - backend-engineer
    - frontend-engineer
    - staff-engineer
    - quality-engineer
    - code-reviewer
    - debugger
    - git-workflow-master
    - devops-engineer
    - security-engineer
    - technical-writer
    - incident-commander
  managed_skills:
    - context7-mcp
    - context-budget
    - dispatching-parallel-agents
    - executing-plans
    - obsidian-memory
    - receiving-code-review
    - requesting-code-review
    - systematic-debugging
    - test-driven-development
    - using-git-worktrees
    - verification-before-completion
    - writing-plans
  codex_mode: software-development
  cursor_mode: software-development
